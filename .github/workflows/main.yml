name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create User 'flex' and Remove All Others from RDP
        run: |
          # 1. إنشاء مستخدم flex
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          # حذف المستخدم القديم إن وجد
          if (Get-LocalUser -Name "flex" -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name "flex"
          }

          # إنشاء المستخدم الجديد
          New-LocalUser -Name "flex" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "flex"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "flex"

          # 2. إزالة أي مستخدم آخر من مجموعة Remote Desktop Users (باستثناء flex)
          $rdpUsers = Get-LocalGroupMember -Group "Remote Desktop Users"
          foreach ($user in $rdpUsers) {
              if ($user.Name -ne "flex" -and $user.Name -ne "Administrator") {
                  Remove-LocalGroupMember -Group "Remote Desktop Users" -Member $user.Name -ErrorAction SilentlyContinue
              }
          }

          # 3. تعطيل حساب Administrator المدمج إن وجد
          if (Get-LocalUser -Name "Administrator" -ErrorAction SilentlyContinue) {
              Disable-LocalUser -Name "Administrator"
          }

          # 4. (اختياري) تعطيل أي مستخدم آخر قد يكون موجوداً (مثل runneradmin) من Remote Desktop
          #    ملاحظة: runneradmin هو المستخدم الافتراضي، لكننا نضمن أنه ليس في مجموعة RDP.
          #    نحتاج أيضاً إلى التأكد من أنه ليس في المجموعة، لكنه قد لا يكون موجوداً في القائمة.
          #    سنقوم بإزالته من المجموعة إذا ظهر.

          # 5. حفظ بيانات الدخول
          echo "RDP_CREDS=User: flex | Password: $password" >> $env:GITHUB_ENV

          # 6. التحقق من وجود المستخدم
          if (-not (Get-LocalUser -Name "flex")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          $tsPath = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsPath)) {
              $tsPath = "$env:ProgramFiles (x86)\Tailscale\tailscale.exe"
          }
          & $tsPath up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & $tsPath ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: flex"
          Write-Host "Password: $(echo $env:RDP_CREDS | Select-String -Pattern 'Password: (.+)' | ForEach-Object { $_.Matches.Groups[1].Value })"
          Write-Host "==================`n"
          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"
              Start-Sleep -Seconds 300
          }
